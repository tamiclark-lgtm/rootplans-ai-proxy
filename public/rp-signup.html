<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — RootPlans</title>
  <meta name="description" content="Create your free RootPlans account and start planning your garden with AI." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:       #2d6a4f;
      --green-light: #52b788;
      --text:        #1a2e1e;
      --muted:       #5a7360;
      --border:      #d4e6da;
      --bg:          #f4faf6;
      --error:       #c0392b;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(45,106,79,0.12);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
    }
    .logo {
      display: block;
      text-align: center;
      text-decoration: none;
      margin-bottom: 28px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
    }
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--green-light); }
    input.error { border-color: var(--error); }
    .field-error {
      font-size: 12px;
      color: var(--error);
      margin-top: 4px;
      min-height: 16px;
    }
    .alert {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 18px;
    }
    .alert-error { background: #fef2f2; color: var(--error); border: 1px solid #fecaca; }
    .hidden { display: none !important; }
    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #2d6a4f, #52b788);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.2s;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .pw-strength {
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      margin-top: 8px;
      overflow: hidden;
    }
    .pw-bar {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
      width: 0;
    }
    .pw-label { font-size: 11px; margin-top: 4px; font-weight: 500; color: var(--muted); }
    .terms {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 12px;
      line-height: 1.6;
    }
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--muted);
    }
    .footer a { color: var(--green); font-weight: 600; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="card">

    <a href="/" class="logo">
      <img src="/rootplans.png" alt="Root Plans" style="height:80px;width:auto;display:block;margin:0 auto 8px;" />
    </a>

    <h1>Create Account</h1>
    <p class="subtitle">Start planning your garden — free forever.</p>

    <div id="formAlert" class="alert alert-error hidden"></div>

    <form id="signupForm" novalidate>

      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" placeholder="Jane Smith" autocomplete="name" required />
        <p class="field-error" id="nameErr"></p>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
        <p class="field-error" id="emailErr"></p>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create a password (8+ characters)" autocomplete="new-password" required />
        <div class="pw-strength"><div class="pw-bar" id="pwBar"></div></div>
        <p class="pw-label" id="pwLabel"></p>
        <p class="field-error" id="passwordErr"></p>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Re-enter your password" autocomplete="new-password" required />
        <p class="field-error" id="confirmPasswordErr"></p>
      </div>

      <button type="submit" id="submitBtn">Create Account →</button>

      <p class="terms">By creating an account you agree to our terms of service.</p>
    </form>

    <div class="footer">
      Already have an account? <a href="/rp-login.html">Sign In</a>
    </div>

  </div>

  <script src="/js/rp-auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      if (RP.isLoggedIn()) {
        const data = await RP.init();
        if (data.user) { redirect(); return; }
      }
    });

    function redirect() {
      const params = new URLSearchParams(location.search);
      const next = params.get('next');
      window.location.href = next ? decodeURIComponent(next) : '/';
    }

    function setErr(field, msg) {
      document.getElementById(field)?.classList.toggle('error', !!msg);
      const e = document.getElementById(field + 'Err');
      if (e) e.textContent = msg || '';
    }
    function clearErrors() {
      ['name','email','password','confirmPassword'].forEach(f => setErr(f, ''));
      document.getElementById('formAlert').classList.add('hidden');
    }

    // Password strength
    document.getElementById('password').addEventListener('input', function () {
      const v = this.value;
      let score = 0;
      if (v.length >= 8)  score++;
      if (v.length >= 12) score++;
      if (/[A-Z]/.test(v)) score++;
      if (/[0-9]/.test(v)) score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;
      const bar    = document.getElementById('pwBar');
      const label  = document.getElementById('pwLabel');
      const colors = ['','#DC2626','#F59E0B','#D97706','#059669','#059669'];
      const labels = ['','Too short','Weak','Fair','Good','Strong'];
      bar.style.width      = v ? Math.min(100, score * 20) + '%' : '0';
      bar.style.background = colors[score] || colors[1];
      label.textContent    = v ? (labels[score] || 'Strong') : '';
      label.style.color    = colors[score] || '#DC2626';
      setErr('password', '');
    });

    document.getElementById('signupForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      clearErrors();

      const name            = document.getElementById('name').value.trim();
      const email           = document.getElementById('email').value.trim();
      const password        = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      let valid = true;
      if (!name)                    { setErr('name', 'Name is required'); valid = false; }
      if (!email)                   { setErr('email', 'Email is required'); valid = false; }
      else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setErr('email', 'Enter a valid email'); valid = false; }
      if (!password)                { setErr('password', 'Password is required'); valid = false; }
      else if (password.length < 8) { setErr('password', 'Password must be at least 8 characters'); valid = false; }
      if (password && confirmPassword !== password) { setErr('confirmPassword', 'Passwords do not match'); valid = false; }
      if (!valid) return;

      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Creating account…';

      const { ok, data } = await RP.signup(name, email, password, confirmPassword);

      btn.disabled = false; btn.textContent = 'Create Account →';

      if (ok) {
        redirect();
      } else {
        if (data.field) {
          setErr(data.field, data.error);
        } else {
          const a = document.getElementById('formAlert');
          a.textContent = data.error || 'Something went wrong. Please try again.';
          a.classList.remove('hidden');
        }
      }
    });

    ['name','email','confirmPassword'].forEach(id => {
      document.getElementById(id)?.addEventListener('input', () => setErr(id, ''));
    });
  </script>
</body>
</html>
