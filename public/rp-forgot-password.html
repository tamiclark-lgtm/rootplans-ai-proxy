<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Root Plans</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:      #2f5d34;
      --primary2:     #4e8b54;
      --primary-dark: #244a29;
      --text:         #2c3e2f;
      --muted:        #6b7c6f;
      --border:       #dcdcdc;
      --bg:           #f6f8f5;
      --error:        #c0392b;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .site-header {
      width: 100%;
      height: 64px;
      background: #fff;
      border-bottom: 1px solid #eee;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-logo img {
      height: 40px;
      width: auto;
      object-fit: contain;
      display: block;
    }
    .sign-out-btn {
      background: transparent;
      border: none;
      color: var(--primary);
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .sign-out-btn:hover { background: rgba(47,93,52,0.08); }
    .page-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05), 0 1px 4px rgba(0,0,0,0.06);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    h1 { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
    .form-group { text-align: left; margin-bottom: 20px; }
    label { display: block; font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 7px; }
    input[type="email"] {
      width: 100%; padding: 13px 14px;
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 16px; font-family: inherit; color: var(--text);
      background: #fff; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      min-height: 48px;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(47,93,52,0.15); }
    input.error { border-color: var(--error); }
    .field-error { font-size: 12px; color: var(--error); margin-top: 5px; min-height: 16px; }
    .alert { padding: 12px 14px; border-radius: 10px; font-size: 14px; margin-bottom: 20px; }
    .alert-error { background: #fef2f2; color: var(--error); border: 1px solid #fecaca; }
    .hidden { display: none !important; }
    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      color: #fff; border: none; border-radius: 10px;
      font-size: 16px; font-weight: 700; font-family: inherit;
      cursor: pointer; min-height: 48px;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .btn:hover { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); box-shadow: 0 4px 12px rgba(47,93,52,0.25); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; box-shadow: none; }
    .back { display: block; margin-top: 20px; font-size: 14px; color: var(--primary); font-weight: 500; text-decoration: none; }
    .back:hover { text-decoration: underline; }
    .success-icon { font-size: 52px; margin-bottom: 16px; }
    @media (max-width: 480px) { .card { padding: 32px 24px; } }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="/" class="header-logo">
      <img src="/rootplans.png" alt="Root Plans" />
    </a>
    <button id="signOutBtn" class="sign-out-btn hidden" onclick="RP.logout()">Sign Out</button>
  </header>

  <div class="page-content">
  <div class="card">

    <!-- Email form -->
    <div id="formView">
      <h1>Forgot Your Password?</h1>
      <p class="subtitle">Enter your email and we'll send you a reset link.</p>

      <div id="formAlert" class="alert alert-error hidden"></div>

      <form id="forgotForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
          <p class="field-error" id="emailErr"></p>
        </div>
        <button type="submit" id="submitBtn" class="btn">Send Reset Link</button>
      </form>

      <a href="/rp-login.html" class="back">← Back to Sign In</a>
    </div>

    <!-- Success state -->
    <div id="successView" class="hidden">
      <div class="success-icon">📬</div>
      <h1>Check Your Inbox</h1>
      <p class="subtitle">If an account exists for that email, we've sent a reset link. Check your spam folder too.</p>
      <a href="/rp-login.html" class="btn" style="display:block;text-decoration:none;margin-top:8px;">← Back to Sign In</a>
    </div>

  </div>
  </div><!-- /page-content -->

  <script src="/js/rp-auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (RP.isLoggedIn()) {
        document.getElementById('signOutBtn')?.classList.remove('hidden');
      }
    });

    document.getElementById('forgotForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const err   = document.getElementById('emailErr');
      err.textContent = '';
      document.getElementById('email').classList.remove('error');
      document.getElementById('formAlert').classList.add('hidden');

      if (!email) {
        err.textContent = 'Email is required';
        document.getElementById('email').classList.add('error');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Sending…';

      try {
        await fetch('/api/rp/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        document.getElementById('formView').classList.add('hidden');
        document.getElementById('successView').classList.remove('hidden');
      } catch {
        btn.disabled = false; btn.textContent = 'Send Reset Link';
        const a = document.getElementById('formAlert');
        a.textContent = 'Connection error. Please try again.';
        a.classList.remove('hidden');
      }
    });

    document.getElementById('email').addEventListener('input', function () {
      this.classList.remove('error');
      document.getElementById('emailErr').textContent = '';
    });
  </script>
</body>
</html>
