<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Root Plans</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:  #2f5d34;
      --primary2: #3d7045;
      --text:     #1a1a1a;
      --muted:    #4a4a4a;
      --border:   rgba(0,0,0,0.12);
      --bg:       #f0ece0;
      --error:    #c0392b;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.10);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .logo { display: block; margin-bottom: 28px; }
    h1 { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
    .form-group { text-align: left; margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    input[type="email"] {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 15px; font-family: inherit; color: var(--text);
      background: #fff; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--green-light); }
    input.error { border-color: var(--error); }
    .field-error { font-size: 12px; color: var(--error); margin-top: 4px; min-height: 16px; }
    .alert { padding: 12px 14px; border-radius: 10px; font-size: 14px; margin-bottom: 18px; }
    .alert-error { background: #fef2f2; color: var(--error); border: 1px solid #fecaca; }
    .hidden { display: none !important; }
    .btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      color: #fff; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .back { display: block; margin-top: 20px; font-size: 14px; color: var(--primary); font-weight: 500; text-decoration: none; }
    .back:hover { text-decoration: underline; }
    .success-icon { font-size: 52px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">

    <a href="/" class="logo">
      <img src="/rootplans.png" alt="Root Plans" style="height:72px;width:auto;" />
    </a>

    <!-- Email form -->
    <div id="formView">
      <h1>Forgot Your Password?</h1>
      <p class="subtitle">Enter your email and we'll send you a reset link.</p>

      <div id="formAlert" class="alert alert-error hidden"></div>

      <form id="forgotForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
          <p class="field-error" id="emailErr"></p>
        </div>
        <button type="submit" id="submitBtn">Send Reset Link</button>
      </form>

      <a href="/rp-login.html" class="back">← Back to Sign In</a>
    </div>

    <!-- Success state -->
    <div id="successView" class="hidden">
      <div class="success-icon">📬</div>
      <h1>Check Your Inbox</h1>
      <p class="subtitle">If an account exists for that email, we've sent a reset link. Check your spam folder too.</p>
      <a href="/rp-login.html" class="btn" style="display:block;text-decoration:none;margin-top:8px;">← Back to Sign In</a>
    </div>

  </div>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const err   = document.getElementById('emailErr');
      err.textContent = '';
      document.getElementById('email').classList.remove('error');
      document.getElementById('formAlert').classList.add('hidden');

      if (!email) {
        err.textContent = 'Email is required';
        document.getElementById('email').classList.add('error');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Sending…';

      try {
        await fetch('/api/rp/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        document.getElementById('formView').classList.add('hidden');
        document.getElementById('successView').classList.remove('hidden');
      } catch {
        btn.disabled = false; btn.textContent = 'Send Reset Link';
        const a = document.getElementById('formAlert');
        a.textContent = 'Connection error. Please try again.';
        a.classList.remove('hidden');
      }
    });

    document.getElementById('email').addEventListener('input', function () {
      this.classList.remove('error');
      document.getElementById('emailErr').textContent = '';
    });
  </script>
</body>
</html>
