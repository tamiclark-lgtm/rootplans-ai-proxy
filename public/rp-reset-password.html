<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Root Plans</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:  #2f5d34;
      --primary2: #3d7045;
      --text:     #1a1a1a;
      --muted:    #4a4a4a;
      --border:   rgba(0,0,0,0.12);
      --bg:       #f0ece0;
      --error:    #c0392b;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.10);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .logo { display: block; margin-bottom: 28px; }
    h1 { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
    .form-group { text-align: left; margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    input[type="password"] {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 15px; font-family: inherit; color: var(--text);
      background: #fff; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--green-light); }
    input.error { border-color: var(--error); }
    .field-error { font-size: 12px; color: var(--error); margin-top: 4px; min-height: 16px; }
    .alert { padding: 12px 14px; border-radius: 10px; font-size: 14px; margin-bottom: 18px; }
    .alert-error { background: #fef2f2; color: var(--error); border: 1px solid #fecaca; }
    .hidden { display: none !important; }
    .btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      color: #fff; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: opacity 0.2s;
      text-decoration: none; display: block;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .icon { font-size: 52px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">

    <a href="/" class="logo">
      <img src="/rootplans.png" alt="Root Plans" style="height:72px;width:auto;" />
    </a>

    <!-- Expired/invalid token -->
    <div id="invalidView" class="hidden">
      <div class="icon">🔒</div>
      <h1>Link Expired</h1>
      <p class="subtitle">This reset link has expired or is invalid. Please request a new one.</p>
      <a href="/rp-forgot-password.html" class="btn">Request New Link</a>
    </div>

    <!-- Reset form -->
    <div id="formView">
      <h1>Set a New Password</h1>
      <p class="subtitle">Choose a strong password for your account.</p>

      <div id="formAlert" class="alert alert-error hidden"></div>

      <form id="resetForm" novalidate>
        <div class="form-group">
          <label for="password">New Password</label>
          <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" required />
          <p class="field-error" id="passwordErr"></p>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <input type="password" id="confirmPassword" placeholder="Re-enter your new password" autocomplete="new-password" required />
          <p class="field-error" id="confirmPasswordErr"></p>
        </div>
        <button type="submit" id="submitBtn">Update Password</button>
      </form>
    </div>

    <!-- Success state -->
    <div id="successView" class="hidden">
      <div class="icon">✅</div>
      <h1>Password Updated</h1>
      <p class="subtitle">You've been signed in automatically.</p>
      <a href="/" class="btn" style="margin-top:8px;">Go to My Garden →</a>
    </div>

  </div>

  <script src="/js/rp-auth.js"></script>
  <script>
    const token = new URLSearchParams(location.search).get('token');

    document.addEventListener('DOMContentLoaded', function () {
      if (!token) {
        document.getElementById('formView').classList.add('hidden');
        document.getElementById('invalidView').classList.remove('hidden');
      }
    });

    function setErr(field, msg) {
      document.getElementById(field)?.classList.toggle('error', !!msg);
      const e = document.getElementById(field + 'Err');
      if (e) e.textContent = msg || '';
    }

    document.getElementById('resetForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      setErr('password', ''); setErr('confirmPassword', '');
      document.getElementById('formAlert').classList.add('hidden');

      const password        = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!password || password.length < 8) { setErr('password', 'Password must be at least 8 characters'); return; }
      if (password !== confirmPassword)      { setErr('confirmPassword', 'Passwords do not match'); return; }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Updating…';

      try {
        const r = await fetch('/api/rp/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });
        const data = await r.json();

        if (r.ok) {
          RP.setSession(data);
          document.getElementById('formView').classList.add('hidden');
          document.getElementById('successView').classList.remove('hidden');
        } else if (data.error?.includes('expired') || data.error?.includes('invalid')) {
          document.getElementById('formView').classList.add('hidden');
          document.getElementById('invalidView').classList.remove('hidden');
        } else {
          setErr('password', data.error || 'Something went wrong.');
          btn.disabled = false; btn.textContent = 'Update Password';
        }
      } catch {
        const a = document.getElementById('formAlert');
        a.textContent = 'Connection error. Please try again.';
        a.classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'Update Password';
      }
    });

    ['password','confirmPassword'].forEach(id => {
      document.getElementById(id)?.addEventListener('input', () => setErr(id, ''));
    });
  </script>
</body>
</html>
