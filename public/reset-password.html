<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Little Gem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/gem.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <a href="/" class="auth-logo">✨ Little Gem</a>

      <!-- Invalid/expired token -->
      <div id="invalidView" class="hidden" style="text-align:center;">
        <div style="font-size:48px;margin-bottom:20px;">🔒</div>
        <h2 style="font-family:'Playfair Display',serif;font-size:22px;color:var(--text);margin-bottom:10px;">Link Expired</h2>
        <p style="font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.6;">This password reset link has expired or is invalid. Please request a new one.</p>
        <a href="/forgot-password.html" class="btn btn-primary btn-block">Request New Link</a>
      </div>

      <!-- Reset form -->
      <div id="formView">
        <h1 class="auth-title">Set a New Password</h1>
        <p class="auth-subtitle">Choose a strong password for your account.</p>

        <div id="formAlert" class="alert hidden"></div>

        <form class="auth-form" id="resetForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="password">New Password</label>
            <input class="form-input" type="password" id="password" name="password" placeholder="At least 8 characters" autocomplete="new-password" required />
            <p class="form-error" id="passwordErr"></p>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirmPassword">Confirm New Password</label>
            <input class="form-input" type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your new password" autocomplete="new-password" required />
            <p class="form-error" id="confirmPasswordErr"></p>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
            <span class="btn-text">Update Password</span>
            <span class="spinner"></span>
          </button>
        </form>
      </div>

      <!-- Success state -->
      <div id="successView" class="hidden" style="text-align:center;">
        <div style="font-size:56px;margin-bottom:20px;">✅</div>
        <h2 style="font-family:'Playfair Display',serif;font-size:22px;color:var(--text);margin-bottom:10px;">Password Updated</h2>
        <p style="font-size:14px;color:var(--muted);margin-bottom:24px;">You've been signed in automatically.</p>
        <a href="/create.html" class="btn btn-primary btn-block">Go to My Books →</a>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    const token = new URLSearchParams(location.search).get('token');

    document.addEventListener('DOMContentLoaded', function () {
      if (!token) {
        document.getElementById('formView').classList.add('hidden');
        document.getElementById('invalidView').classList.remove('hidden');
      }
    });

    function setFieldError(field, msg) {
      document.getElementById(field)?.classList.toggle('error', !!msg);
      const e = document.getElementById(field + 'Err');
      if (e) e.textContent = msg || '';
    }

    document.getElementById('resetForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      setFieldError('password', '');
      setFieldError('confirmPassword', '');
      document.getElementById('formAlert').className = 'alert hidden';

      const password        = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      let valid = true;
      if (!password || password.length < 8) { setFieldError('password', 'Password must be at least 8 characters'); valid = false; }
      if (password !== confirmPassword)      { setFieldError('confirmPassword', 'Passwords do not match'); valid = false; }
      if (!valid) return;

      const btn = document.getElementById('submitBtn');
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const r = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });
        const data = await r.json();

        if (r.ok) {
          LG.setSession(data);
          document.getElementById('formView').classList.add('hidden');
          document.getElementById('successView').classList.remove('hidden');
        } else {
          if (data.error?.includes('expired') || data.error?.includes('invalid')) {
            document.getElementById('formView').classList.add('hidden');
            document.getElementById('invalidView').classList.remove('hidden');
          } else {
            setFieldError('password', data.error || 'Something went wrong.');
            btn.classList.remove('loading');
            btn.disabled = false;
          }
        }
      } catch {
        const a = document.getElementById('formAlert');
        a.textContent = 'Connection error. Please try again.';
        a.className = 'alert alert-error';
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });

    ['password', 'confirmPassword'].forEach(id => {
      document.getElementById(id)?.addEventListener('input', () => setFieldError(id, ''));
    });
  </script>
</body>
</html>
