<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — RootPlans</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:  #2f5d34;
      --primary2: #4e8b54;
      --primary-dark: #244a29;
      --text:     #2c3e2f;
      --muted:    #5a7260;
      --border:   #d4e0d6;
      --bg:       #f6f8f5;
      --error:    #c0392b;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05), 0 1px 4px rgba(0,0,0,0.06);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      display: block;
      text-align: center;
      text-decoration: none;
      margin-bottom: 24px;
    }
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      text-align: center;
    }
    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
      text-align: center;
    }
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 7px;
    }
    .label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #dcdcdc;
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      min-height: 48px;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(47,93,52,0.15);
    }
    input.error { border-color: var(--error); }
    .field-error {
      font-size: 12px;
      color: var(--error);
      margin-top: 5px;
      min-height: 16px;
    }
    .alert {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .alert-error { background: #fef2f2; color: var(--error); border: 1px solid #fecaca; }
    .hidden { display: none !important; }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 4px;
      min-height: 48px;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .btn:hover { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); box-shadow: 0 4px 12px rgba(47,93,52,0.25); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; box-shadow: none; }
    .forgot {
      font-size: 13px;
      color: var(--primary);
      font-weight: 500;
      text-decoration: none;
    }
    .forgot:hover { text-decoration: underline; }
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--muted);
    }
    .footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    @media (max-width: 480px) {
      .card { padding: 32px 24px; }
    }
  </style>
</head>
<body>

  <div class="card">

    <a href="/" class="logo">
      <img src="/rootplans.png" alt="Root Plans" style="width:160px;height:auto;display:block;margin:0 auto;object-fit:contain;" />
    </a>

    <h1>Sign In</h1>
    <p class="subtitle">Welcome back — sign in to your garden.</p>

    <div id="formAlert" class="alert alert-error hidden"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
        <p class="field-error" id="emailErr"></p>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label for="password" style="margin:0;">Password</label>
          <a href="/rp-forgot-password.html" class="forgot">Forgot password?</a>
        </div>
        <input type="password" id="password" placeholder="Your password" autocomplete="current-password" required />
        <p class="field-error" id="passwordErr"></p>
      </div>

      <button type="submit" id="submitBtn" class="btn">Sign In →</button>
    </form>

    <div class="footer">
      No account? <a href="/rp-signup.html">Create one free</a>
    </div>

  </div>

  <script src="/js/rp-auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      if (RP.isLoggedIn()) {
        const data = await RP.validateSession ? RP.init() : null;
        if (data && data.user) { redirect(); return; }
      }
    });

    function redirect() {
      const params = new URLSearchParams(location.search);
      const next = params.get('next');
      window.location.href = next ? decodeURIComponent(next) : '/';
    }

    function setErr(field, msg) {
      document.getElementById(field)?.classList.toggle('error', !!msg);
      const e = document.getElementById(field + 'Err');
      if (e) e.textContent = msg || '';
    }

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      setErr('email', ''); setErr('password', '');
      document.getElementById('formAlert').classList.add('hidden');

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email)    { setErr('email', 'Email is required'); return; }
      if (!password) { setErr('password', 'Password is required'); return; }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Signing in…';

      const { ok, data } = await RP.login(email, password);

      btn.disabled = false; btn.textContent = 'Sign In →';

      if (ok) {
        redirect();
      } else {
        if (data.field) {
          setErr(data.field, data.error);
        } else {
          const a = document.getElementById('formAlert');
          a.textContent = data.error || 'Sign in failed. Please try again.';
          a.classList.remove('hidden');
        }
      }
    });

    ['email', 'password'].forEach(id => {
      document.getElementById(id)?.addEventListener('input', () => setErr(id, ''));
    });
  </script>
</body>
</html>
